<!doctype html>
<html lang="az">
<head><meta charset="UTF-8"><title>Admin | Məhsullar</title></head>
<body>
  <h1>Admin — Məhsullar</h1>
  <a href="/admin/orders">Sifarişlər</a> | <a href="/admin/users">İstifadəçilər</a>
  <form id="createForm">
    <input id="name" placeholder="Ad" required />
    <input id="price" placeholder="Qiymət" type="number" required />
    <input id="stock" placeholder="Stok" type="number" required />
    <input id="imageUrl" placeholder="Şəkil URL" />
    <input id="imageFile" type="file" accept="image/*" />
    <button>Əlavə et</button>
  </form>

  <h3>Redaktə</h3>
  <form id="editForm" hidden>
    <input id="editId" type="hidden" />
    <input id="editName" required />
    <input id="editPrice" type="number" required />
    <input id="editStock" type="number" required />
    <button>Yadda saxla</button>
  </form>

  <table border="1" cellpadding="8"><thead><tr><th>ID</th><th>Ad</th><th>Qiymət</th><th>Stok</th><th></th></tr></thead><tbody id="rows"></tbody></table>

  <script type="module">
    import { getProductsPaginated, getProductById } from "../../js/services/product.service.js";
    import { createProduct, updateProduct, deleteProduct } from "../../js/services/admin.service.js";
    import { uploadImage } from "../../js/cloudinary.js";
    const tbody = document.getElementById("rows");

    async function load() {
      const { items } = await getProductsPaginated({ page: 1, pageSize: 24 });
      tbody.innerHTML = items.map(p => `<tr><td>${p.Id}</td><td>${p.Name}</td><td>${p.Price}</td><td>${p.Stock}</td><td><button data-edit="${p.Id}">Redaktə</button> <button data-del="${p.Id}">Sil</button></td></tr>`).join("");
      tbody.querySelectorAll("button[data-del]").forEach((b) => b.onclick = async () => { await deleteProduct(Number(b.dataset.del)); await load(); });
      tbody.querySelectorAll("button[data-edit]").forEach((b) => b.onclick = async () => {
        const id = Number(b.dataset.edit);
        const { product } = await getProductById(id);
        editForm.hidden = false;
        editId.value = id;
        editName.value = product.Name;
        editPrice.value = product.Price;
        editStock.value = product.Stock;
      });
    }

    createForm.onsubmit = async (e) => {
      e.preventDefault();
      let image = imageUrl.value.trim();
      if (!image && imageFile.files[0]) image = await uploadImage(imageFile.files[0]);
      await createProduct({ name: name.value, price: Number(price.value), stock: Number(stock.value), images: image ? [image] : [] });
      createForm.reset();
      await load();
    };

    editForm.onsubmit = async (e) => {
      e.preventDefault();
      await updateProduct(Number(editId.value), { name: editName.value, price: Number(editPrice.value), stock: Number(editStock.value) });
      editForm.hidden = true;
      await load();
    };

    load().catch((e) => (tbody.innerHTML = `<tr><td colspan='5'>${e.message}</td></tr>`));
  </script>
</body>
</html>
