<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopHub | Profil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --bg: #f6f5f2;
        --surface: #ffffff;
        --muted: #6a6a6a;
        --text: #1f1f22;
        --accent: #d86f00;
        --line: #e6e4df;
        --header-bg: #faf9f6e8;
        --input-bg: #fff;
      }
      [data-theme="dark"] {
        --bg: #101010;
        --surface: #161616;
        --muted: #a3a3a3;
        --text: #f5f5f5;
        --accent: #e07a12;
        --line: #2a2a2a;
        --header-bg: #131313e6;
        --input-bg: #1b1b1b;
      }
      * {
        box-sizing: border-box;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
      }
      body {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        overflow-x: hidden;
        display: flex;
        flex-direction: column;
      }
      .site-header {
        position: sticky;
        top: 0;
        z-index: 100;
        background: var(--header-bg);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid var(--line);
      }
      .header-content {
        width: min(1180px, calc(100% - 48px));
        margin: 0 auto;
        height: 78px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .header-logo {
        width: 40px;
        height: 40px;
        border-radius: 12px;
        background: #1e1e1e;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #f6f6f6;
        font-weight: bold;
        font-size: 20px;
      }
      nav {
        display: flex;
        gap: 20px;
        font-size: 14px;
      }
      nav a, nav button {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        text-decoration: none;
        transition: color 0.2s;
      }
      nav a:hover, nav button:hover {
        color: var(--text);
      }
      .container {
        width: min(1180px, calc(100% - 48px));
        margin: 0 auto;
        flex: 1;
      }
      main {
        padding: 48px 0;
      }
      .main-content {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 32px;
        margin-bottom: 32px;
      }
      .profile-header {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 32px;
      }
      .profile-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), #ff9a56);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 32px;
        flex-shrink: 0;
      }
      .profile-header-info h1 {
        margin: 0 0 8px;
        font-size: 28px;
        font-weight: 600;
      }
      .profile-header-info p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 24px;
      }
      .card-title {
        font-size: 18px;
        font-weight: 600;
        margin: 0 0 20px;
        color: var(--text);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .card-title button {
        background: none;
        border: none;
        color: var(--accent);
        cursor: pointer;
        font-size: 14px;
        text-decoration: underline;
        transition: opacity 0.2s;
      }
      .card-title button:hover {
        opacity: 0.8;
      }
      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 0;
        border-bottom: 1px solid var(--line);
      }
      .info-row:last-child {
        border-bottom: none;
      }
      .info-label {
        color: var(--muted);
        font-size: 14px;
        font-weight: 500;
      }
      .info-value {
        color: var(--text);
        font-weight: 600;
      }
      .btn {
        background: var(--accent);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: opacity 0.2s;
      }
      .btn:hover {
        opacity: 0.9;
      }
      .btn-secondary {
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--line);
      }
      .btn-secondary:hover {
        background: var(--line);
      }
      .modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
      }
      .modal.active {
        display: flex;
      }
      .modal-content {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 32px;
        max-width: 500px;
        width: 90%;
      }
      .modal-title {
        font-size: 22px;
        font-weight: 600;
        margin: 0 0 24px;
      }
      .form-group {
        margin-bottom: 20px;
      }
      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: var(--text);
        font-weight: 500;
        font-size: 14px;
      }
      .form-group input {
        width: 100%;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--input-bg);
        color: var(--text);
        font-size: 14px;
      }
      .form-group input:focus {
        outline: none;
        border-color: var(--accent);
      }
      .form-buttons {
        display: flex;
        gap: 12px;
        justify-content: flex-end;
      }
      .site-footer {
        background: #121317;
        color: #e4e4e4;
        margin-top: auto;
      }
      .footer-content {
        width: min(1180px, calc(100% - 48px));
        margin: 0 auto;
        padding: 50px 0 24px;
        border-top: 1px solid #26272c;
        text-align: center;
        font-size: 14px;
      }
      .loading {
        text-align: center;
        padding: 40px;
        color: var(--muted);
      }
      .error {
        color: #ff6b6b;
        padding: 16px;
        background: #ff6b6b20;
        border-radius: 8px;
        margin-bottom: 16px;
      }
      @media (max-width: 768px) {
        .main-content {
          grid-template-columns: 1fr;
        }
        .profile-header {
          flex-direction: column;
          text-align: center;
        }
        nav {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="header-content">
        <div class="header-logo">🛍</div>
        <nav>
          <a href="/">Ana səhifə</a>
          <button onclick="window.location='/#shop'">Mağaza</button>
          <a href="/orders">Sifarişlərim</a>
        </nav>
      </div>
    </header>

    <main>
      <div class="container">
        <div class="profile-header">
          <div class="profile-avatar" id="avatar">👤</div>
          <div class="profile-header-info">
            <h1>Profil</h1>
            <p id="userEmail">Yüklənir...</p>
          </div>
        </div>

        <div id="errorMsg" class="error" style="display: none;"></div>

        <div class="main-content">
          <div class="card">
            <div class="card-title">
              Şəxsi Məlumatlar
              <button onclick="openEditModal()">Redaktə et</button>
            </div>
            <div id="profileInfo">
              <div class="loading">Yüklənir...</div>
            </div>
          </div>

          <div class="card">
            <div class="card-title">
              Təhlükəsizlik
              <button onclick="openPasswordModal()">Dəyiş</button>
            </div>
            <div id="securityInfo">
              <div class="info-row">
                <span class="info-label">Şifrə</span>
                <span class="info-value">●●●●●●●●</span>
              </div>
              <div class="info-row">
                <span class="info-label">Son dəyişmə</span>
                <span class="info-value" id="passwordChanged">Məlum deyil</span>
              </div>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">Hesab</div>
          <div style="display: flex; gap: 12px;">
            <button class="btn btn-secondary" onclick="logout()">Çıxış</button>
            <button class="btn btn-secondary" style="border-color: #ff6b6b; color: #ff6b6b;" onclick="deleteAccount()">Hesabı sil</button>
          </div>
        </div>
      </div>
    </main>

    <!-- Edit Profile Modal -->
    <div id="editModal" class="modal">
      <div class="modal-content">
        <h2 class="modal-title">Profili redaktə et</h2>
        <form id="editForm" onsubmit="saveProfile(event)">
          <div class="form-group">
            <label for="editEmail">Email</label>
            <input type="email" id="editEmail" required />
          </div>
          <div class="form-buttons">
            <button type="button" class="btn btn-secondary" onclick="closeEditModal()">Ləğv</button>
            <button type="submit" class="btn">Yadda saxla</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Change Password Modal -->
    <div id="passwordModal" class="modal">
      <div class="modal-content">
        <h2 class="modal-title">Şifrəni dəyiş</h2>
        <form id="passwordForm" onsubmit="changePassword(event)">
          <div class="form-group">
            <label for="currentPassword">Hazırkı şifrə</label>
            <input type="password" id="currentPassword" required />
          </div>
          <div class="form-group">
            <label for="newPassword">Yeni şifrə</label>
            <input type="password" id="newPassword" required />
          </div>
          <div class="form-group">
            <label for="confirmPassword">Yeni şifrəni təkrar edin</label>
            <input type="password" id="confirmPassword" required />
          </div>
          <div class="form-buttons">
            <button type="button" class="btn btn-secondary" onclick="closePasswordModal()">Ləğv</button>
            <button type="submit" class="btn">Dəyiş</button>
          </div>
        </form>
      </div>
    </div>

    <footer class="site-footer">
      <div class="footer-content">
        © <span id="year">2026</span> iShine Accessories. Bütün hüquqlar qorunur.
      </div>
    </footer>

    <script type="module">
      import { me } from "/src/js/services/auth.service.js";

      let currentUser = null;

      // Load user data
      async function loadProfile() {
        try {
          currentUser = await me();
          document.getElementById("userEmail").textContent = currentUser.email;
          document.getElementById("editEmail").value = currentUser.email;
          
          const profileInfo = document.getElementById("profileInfo");
          profileInfo.innerHTML = `
            <div class="info-row">
              <span class="info-label">İstifadəçi ID</span>
              <span class="info-value">${currentUser.id}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Email</span>
              <span class="info-value">${currentUser.email}</span>
            </div>
            <div class="info-row">
              <span class="info-label">Rolu</span>
              <span class="info-value">${currentUser.role || 'İstifadəçi'}</span>
            </div>
          `;

          // Set avatar initial
          const initial = currentUser.email.charAt(0).toUpperCase();
          document.getElementById("avatar").textContent = initial;
        } catch (error) {
          const errorDiv = document.getElementById("errorMsg");
          errorDiv.textContent = error.message || "Profil yükləmə xətası";
          errorDiv.style.display = "block";
          
          setTimeout(() => {
            window.location.href = "/src/pages/auth/login.html";
          }, 2000);
        }
      }

      // Modal functions
      window.openEditModal = () => {
        document.getElementById("editModal").classList.add("active");
      };

      window.closeEditModal = () => {
        document.getElementById("editModal").classList.remove("active");
      };

      window.openPasswordModal = () => {
        document.getElementById("passwordModal").classList.add("active");
      };

      window.closePasswordModal = () => {
        document.getElementById("passwordModal").classList.remove("active");
      };

      // Save profile
      window.saveProfile = async (e) => {
        e.preventDefault();
        alert("Profil redaktəsi funksiyası backend-ə qoşulmamışdır");
        closeEditModal();
      };

      // Change password
      window.changePassword = async (e) => {
        e.preventDefault();
        const newPass = document.getElementById("newPassword").value;
        const confirmPass = document.getElementById("confirmPassword").value;
        
        if (newPass !== confirmPass) {
          alert("Şifrələr uyğun gəlmir");
          return;
        }
        
        alert("Şifrə dəyişmə funksiyası backend-ə qoşulmamışdır");
        closePasswordModal();
      };

      // Logout
      window.logout = () => {
        localStorage.removeItem("authToken");
        window.location.href = "/";
      };

      // Delete account
      window.deleteAccount = () => {
        if (confirm("Hesabınızı silmək istədiyinizə əminsiniz? Bu əməliyyat geri qaytarıla bilməz.")) {
          alert("Hesab silmə funksiyası backend-ə qoşulmamışdır");
        }
      };

      document.getElementById("year").textContent = new Date().getFullYear();

      // Load profile on page load
      loadProfile();
    </script>
  </body>
</html>
