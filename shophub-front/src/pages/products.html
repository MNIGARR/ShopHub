<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopHub | Products</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
      <div class="flex items-center justify-between mb-8 gap-4">
        <h1 class="text-2xl sm:text-3xl font-bold">Məhsullar</h1>
        <a
          href="/"
          class="inline-flex items-center rounded-lg border border-white/20 px-4 py-2 text-sm text-slate-200 hover:bg-white/10 transition"
        >
          Ana səhifəyə qayıt
        </a>
      </div>

      <div
        id="productsGrid"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"
      ></div>

      <div class="flex flex-col items-center mt-10 space-y-3">
        <div
          class="inline-flex items-center bg-slate-900 border border-white/20 rounded-xl shadow-sm p-1"
        >
          <button
            id="prevPage"
            class="p-2 rounded-lg text-slate-200 hover:bg-white/10 disabled:opacity-30 disabled:cursor-not-allowed transition"
            aria-label="Əvvəlki səhifə"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m15 18-6-6 6-6" />
            </svg>
          </button>

          <div id="pageNumbers" class="flex px-2 space-x-1"></div>
          <button
            id="nextPage"
            class="p-2 rounded-lg text-slate-200 hover:bg-white/10 disabled:opacity-30 disabled:cursor-not-allowed transition"
            aria-label="Növbəti səhifə"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="m9 18 6-6-6-6" />
            </svg>
          </button>
        </div>
        <p id="totalInfo" class="text-sm text-slate-400 font-medium"></p>
      </div>
    </main>

    <script type="module" src="/src/js/products.js"></script>
  </body>
</html>
