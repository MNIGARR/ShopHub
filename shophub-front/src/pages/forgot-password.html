<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopHub | Şifrə Sıfırlama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
    </style>
  </head>
  <body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans flex items-center justify-center">

    <div class="w-full max-w-md px-4">
      <!-- Logo -->
      <div class="text-center mb-10">
        <a href="../../index.html" class="inline-flex items-center gap-2">
          <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/20">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" class="text-white">
              <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
              <path d="M3 6h18" /><path d="M16 10a4 4 0 0 1-8 0" />
            </svg>
          </div>
          <span class="text-xl font-bold tracking-tight text-white uppercase">
            Shop<span class="text-blue-500">Hub</span>
          </span>
        </a>
      </div>

      <!-- Step 1: Send Code -->
      <div id="stepSendCode" class="glass p-10 rounded-[32px] border border-white/5">
        <h2 class="text-2xl font-bold text-white mb-2">Şifrə Sıfırlama</h2>
        <p class="text-slate-500 text-sm mb-8">E-poçt ünvanınızı daxil edin, sizə sıfırlama kodu göndərəcəyik</p>

        <div id="errorMsg1" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-4 rounded-xl mb-6"></div>
        <div id="successMsg1" class="hidden bg-green-500/10 border border-green-500/20 text-green-400 text-sm p-4 rounded-xl mb-6"></div>

        <form id="sendCodeForm" class="space-y-5">
          <div>
            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block">E-poçt</label>
            <input
              id="resetEmail"
              type="email"
              required
              class="w-full bg-black/20 border border-white/10 rounded-xl px-5 py-4 text-sm focus:outline-none focus:border-blue-500 transition-colors"
              placeholder="nümunə@email.com"
            />
          </div>

          <button
            id="sendCodeBtn"
            type="submit"
            class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-600/20 hover:bg-blue-700 transition-colors disabled:opacity-50"
          >
            Sıfırlama Kodu Göndər
          </button>
        </form>

        <div class="mt-6 text-center">
          <a href="/login" class="text-sm text-slate-500 hover:text-white transition-colors">
            ← Girişə qayıt
          </a>
        </div>
      </div>

      <!-- Step 2: Enter Code + New Password -->
      <div id="stepResetPassword" class="hidden glass p-10 rounded-[32px] border border-white/5">
        <h2 class="text-2xl font-bold text-white mb-2">Yeni Şifrə</h2>
        <p class="text-slate-500 text-sm mb-8">E-poçtunuza gələn kodu və yeni şifrənizi daxil edin</p>

        <div id="errorMsg2" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-4 rounded-xl mb-6"></div>
        <div id="successMsg2" class="hidden bg-green-500/10 border border-green-500/20 text-green-400 text-sm p-4 rounded-xl mb-6"></div>

        <form id="resetForm" class="space-y-5">
          <div>
            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block">Sıfırlama Kodu</label>
            <input
              id="resetCode"
              type="text"
              required
              maxlength="6"
              inputmode="numeric"
              pattern="[0-9]{6}"
              class="w-full bg-black/20 border border-white/10 rounded-xl px-5 py-4 text-sm text-center tracking-[0.5em] font-bold text-xl focus:outline-none focus:border-blue-500"
              placeholder="000000"
            />
          </div>

          <div>
            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block">Yeni Şifrə</label>
            <input
              id="newPassword"
              type="password"
              required
              minlength="6"
              class="w-full bg-black/20 border border-white/10 rounded-xl px-5 py-4 text-sm focus:outline-none focus:border-blue-500"
              placeholder="Minimum 6 simvol"
            />
          </div>

          <button
            id="resetBtn"
            type="submit"
            class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-green-600/20 hover:bg-green-700 transition-colors disabled:opacity-50"
          >
            Şifrəni Yenilə
          </button>
        </form>
      </div>
    </div>

    <script type="module">
      import { endpoints } from "../js/api/endpoints.js";
      import { apiFetch } from "../js/api/http.js";

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      let savedEmail = "";

      // Step 1: Send Code
      document.getElementById("sendCodeForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("resetEmail").value.trim();
        const errorMsg = document.getElementById("errorMsg1");
        const successMsg = document.getElementById("successMsg1");
        const btn = document.getElementById("sendCodeBtn");

        errorMsg.classList.add("hidden");
        successMsg.classList.add("hidden");

        if (!emailRegex.test(email)) {
          errorMsg.textContent = "Düzgün email formatı daxil edin";
          errorMsg.classList.remove("hidden");
          return;
        }

        try {
          btn.disabled = true;
          btn.textContent = "Göndərilir...";

          await apiFetch(endpoints.auth.forgotPassword(), {
            method: "POST",
            body: { email },
          });

          savedEmail = email;
          successMsg.textContent = "Sıfırlama kodu e-poçtunuza göndərildi!";
          successMsg.classList.remove("hidden");

          // Show step 2 after a short delay
          setTimeout(() => {
            document.getElementById("stepSendCode").classList.add("hidden");
            document.getElementById("stepResetPassword").classList.remove("hidden");
          }, 1500);
        } catch (err) {
          errorMsg.textContent = err.message || "Kod göndərilmədi";
          errorMsg.classList.remove("hidden");
        } finally {
          btn.disabled = false;
          btn.textContent = "Sıfırlama Kodu Göndər";
        }
      });

      // Step 2: Reset Password
      document.getElementById("resetForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const code = document.getElementById("resetCode").value.trim();
        const newPassword = document.getElementById("newPassword").value;
        const errorMsg = document.getElementById("errorMsg2");
        const successMsg = document.getElementById("successMsg2");
        const btn = document.getElementById("resetBtn");

        errorMsg.classList.add("hidden");
        successMsg.classList.add("hidden");

        if (!/^\d{6}$/.test(code)) {
          errorMsg.textContent = "Kod yalnız 6 rəqəm olmalıdır";
          errorMsg.classList.remove("hidden");
          return;
        }

        if (newPassword.length < 6) {
          errorMsg.textContent = "Şifrə minimum 6 simvol olmalıdır";
          errorMsg.classList.remove("hidden");
          return;
        }

        try {
          btn.disabled = true;
          btn.textContent = "Yenilənir...";

          await apiFetch(endpoints.auth.resetPassword(), {
            method: "POST",
            body: { email: savedEmail, code, newPassword },
          });

          successMsg.textContent = "Şifrəniz uğurla yeniləndi! Girişə yönləndirilirsiniz...";
          successMsg.classList.remove("hidden");

          setTimeout(() => {
            window.location.href = "/login";
          }, 2000);
        } catch (err) {
          errorMsg.textContent = err.message || "Şifrə yenilənmədi";
          errorMsg.classList.remove("hidden");
        } finally {
          btn.disabled = false;
          btn.textContent = "Şifrəni Yenilə";
        }
      });
    </script>
  </body>
</html>
