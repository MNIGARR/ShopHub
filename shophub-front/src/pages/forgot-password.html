<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopHub | Şifrə Sıfırlama</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
    </style>
  </head>
  <body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans flex items-center justify-center">

    <div class="w-full max-w-md px-4">
      <!-- Logo -->
      <div class="text-center mb-10">
        <a href="../../index.html" class="inline-flex items-center gap-2">
          <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/20">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" class="text-white">
              <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
              <path d="M3 6h18" /><path d="M16 10a4 4 0 0 1-8 0" />
            </svg>
          </div>
          <span class="text-xl font-bold tracking-tight text-white uppercase">
            Shop<span class="text-blue-500">Hub</span>
          </span>
        </a>
      </div>

     

      <!-- Step 2: Enter Code + New Password -->
      <div id="stepResetPassword" class="hidden glass p-10 rounded-[32px] border border-white/5">
        <h2 class="text-2xl font-bold text-white mb-2">Yeni Şifrə</h2>
        <p class="text-slate-500 text-sm mb-8">E-poçtunuza gələn kodu və yeni şifrənizi daxil edin</p>

        <div id="errorMsg2" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-4 rounded-xl mb-6"></div>
        <div id="successMsg2" class="hidden bg-green-500/10 border border-green-500/20 text-green-400 text-sm p-4 rounded-xl mb-6"></div>

        <!-- form HTML nümunəsi (sadə): -->
<form id="resetSimpleForm" class="space-y-4">
  <div>
    <label for="resetEmail">E‑poçt</label>
    <input id="resetEmail" type="email" placeholder="nümunə@email.com" />
  </div>
  <div>
    <label for="newPassword">Yeni şifrə</label>
    <input id="newPassword" type="password" placeholder="Minimum 6 simvol" />
  </div>
  <div>
    <label for="confirmPassword">Yeni şifrənin təkrarı</label>
    <input id="confirmPassword" type="password" placeholder="Yeni şifrəni təkrar daxil edin" />
  </div>
  <div id="resetMsg" class="text-sm text-red-500 hidden"></div>
  <button id="resetSubmit" type="submit">Şifrəni Yenilə</button>
</form>

<script type="module">
  import { endpoints } from "../js/api/endpoints.js";
  import { apiFetch } from "../js/api/http.js";
  import { login } from "../js/services/auth.service.js"; // auto-login üçün

  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  const form = document.getElementById("resetSimpleForm");
  const msg = document.getElementById("resetMsg");
  const btn = document.getElementById("resetSubmit");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    msg.classList.add("hidden");
    msg.textContent = "";

    const email = (document.getElementById("resetEmail").value || "").trim();
    const newPassword = (document.getElementById("newPassword").value || "");
    const confirm = (document.getElementById("confirmPassword").value || "");

    if (!emailRegex.test(email)) {
      msg.textContent = "Düzgün email daxil edin";
      msg.classList.remove("hidden");
      return;
    }
    if (newPassword.length < 6) {
      msg.textContent = "Şifrə minimum 6 simvol olmalıdır";
      msg.classList.remove("hidden");
      return;
    }
    if (newPassword !== confirm) {
      msg.textContent = "Yeni şifrə və təkrarı üst-üstə düşmür";
      msg.classList.remove("hidden");
      return;
    }

    try {
      btn.disabled = true;
      btn.textContent = "Yenilənir...";

      // 1) reset password (simple)
      await apiFetch(endpoints.auth.resetPasswordSimple(), {
        method: "POST",
        body: { email, newPassword },
        auth: false,
      });

      // 2) auto-login
      await login(email, newPassword);

      // 3) redirect to home / profile
      window.location.href = "/"; // və ya /profile və ya /orders
    } catch (err) {
      msg.textContent = err?.message || err?.data?.message || "Şifrə yenilənmədi";
      msg.classList.remove("hidden");
    } finally {
      btn.disabled = false;
      btn.textContent = "Şifrəni Yenilə";
    }
  });
</script>
  </body>
</html>
