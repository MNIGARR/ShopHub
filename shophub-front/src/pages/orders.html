<!doctype html>
<html lang="en">
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <title>ShopHub | Sifarişlərim</title>
    <style>
      :root {
        --bg: #0b1220;
        --card: #101a2f;
        --line: #203153;
        --text: #e6eeff;
        --muted: #a2b4db;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(1200px 600px at 80% -100px, #1e3f7c 0%, var(--bg) 55%);
        color: var(--text);
      }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 30px 18px; }
      .head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
      h2 { margin: 0; font-size: 30px; }
      .link {
        color: var(--muted); text-decoration: none; border: 1px solid var(--line);
        border-radius: 999px; padding: 8px 14px;
      }
      .card {
        background: var(--card); border: 1px solid var(--line); border-radius: 18px; overflow: hidden;
      }
      table { width: 100%; border-collapse: collapse; }
      th, td { padding: 14px; border-bottom: 1px solid var(--line); text-align: left; }
      th { font-size: 12px; letter-spacing: .06em; color: var(--muted); text-transform: uppercase; }
      tr:last-child td { border-bottom: 0; }
      .status {
        font-size: 12px; padding: 5px 10px; border-radius: 999px; border: 1px solid var(--line);
        color: #c8d8ff; background: rgba(255,255,255,.03);
      }
      .btn {
        border: 1px solid #365ea6; background: rgba(79,140,255,.16); color: #cfe0ff;
        border-radius: 10px; padding: 7px 11px; cursor: pointer;
      }
      .btn:hover { filter: brightness(1.15); }
      #orderDetailModal {
        position: fixed; inset: 0; background: rgba(0,0,0,.55);
        display: none; align-items: center; justify-content: center; padding: 14px;
      }
      #orderDetailModal.show { display: flex; }
      .modal {
        width: min(760px, 95vw); max-height: 88vh; overflow: auto;
        background: #0f1a2f; border: 1px solid var(--line); border-radius: 16px; padding: 18px;
      }
      .close { float: right; border: 0; background: transparent; color: #9fb4de; font-size: 28px; cursor: pointer; }
      .item {
        border: 1px solid var(--line); background: rgba(255,255,255,.02);
        border-radius: 12px; padding: 10px 12px;
      }
      .empty { color: var(--muted); padding: 20px; text-align: center; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="head">
        <h2>Sifarişlərim</h2>
        <a class="link" href="/profile">Profilə keç</a>
      </div>

      <div class="card">
        <table>
          <thead>
            <tr>
              <th>Sifariş №</th>
              <th>Tarix</th>
              <th>Status</th>
              <th>Cəmi</th>
              <th>Əməliyyat</th>
            </tr>
          </thead>
          <tbody id="ordersTableBody"></tbody>
        </table>
      </div>

      <div
        id="orderDetailModal"
        class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50"
      >
        <div
          class="bg-white rounded-2xl max-w-2xl w-full p-8 relative max-h-[90vh] overflow-y-auto"
        >
          <button
            onclick="closeModal()"
            class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 text-2xl"
          >
            &times;
          </button>
          <h3 class="text-2xl font-bold mb-6 border-b pb-4">
            Sifariş Detalları
          </h3>
                <div id="modalContent" class="space-y-6"></div>

    <script type="module" src="/src/js/orders.js"></script>
  </body>
</html>
