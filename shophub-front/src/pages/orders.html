<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iShine | Sifarişlərim</title>
    <style>
      :root {
        --bg: #f3f3f3;
        --surface: #fff;
        --line: #e5e5e5;
        --text: #0d1321;
        --muted: #7b838d;
      }

      * {
        box-sizing: border-box;
      }

      html, body {
        margin: 0;
        min-height: 100vh;
      }

      body {
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        display: flex;
        flex-direction: column;
      }

      .container {
        width: min(1280px, calc(100% - 48px));
        margin: 0 auto;
      }

      /* Header */
      .site-header {
        position: sticky;
        top: 0;
        z-index: 30;
        background: #f7f7f7;
        border-bottom: 1px solid #dddddd;
      }

      .header-content {
        height: 112px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .brand img {
        width: 126px;
      }

      nav {
        display: flex;
        gap: 42px;
        font-size: 14px;
      }

      nav a {
        color: #7f8590;
        text-decoration: none;
        transition: color 0.2s;
      }

      nav a:hover,
      nav a.active {
        color: #151923;
        font-weight: 600;
      }

      .header-actions {
        display: flex;
        gap: 14px;
      }

      .icon-btn {
        width: 50px;
        height: 50px;
        border: 1px solid #d8d8d8;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: #121622;
        background: #f2f2f2;
        text-decoration: none;
        transition: all 0.2s;
        cursor: pointer;
      }

      .icon-btn:hover {
        background: #e8e8e8;
      }

      .cart-btn {
        background: #151923;
        color: #fff;
        border-color: #151923;
        position: relative;
      }

      .cart-btn:hover {
        background: #1f2937;
      }

      .badge {
        position: absolute;
        right: -2px;
        top: -4px;
        width: 20px;
        height: 20px;
        border-radius: 999px;
        background: #3d9d85;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        display: grid;
        place-items: center;
      }

      /* Main */
      main {
        padding: 40px 0 50px;
        flex: 1;
      }

      .page-header {
        display: flex;
        align-items: flex-start;
        gap: 24px;
        margin-bottom: 32px;
      }

      .header-icon {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 1px solid #d8d8d8;
        background: #f5f5f5;
        display: grid;
        place-items: center;
        color: #1c2231;
        flex-shrink: 0;
      }

      .page-title {
        margin: 0;
        font-size: 52px;
        font-weight: 700;
        line-height: 1.1;
      }

      .page-subtitle {
        margin: 8px 0 0;
        font-size: 14px;
        color: #536276;
      }

      /* Orders Grid */
      .orders-grid {
        display: grid;
        gap: 18px;
      }

      .order-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 34px;
        padding: 20px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .order-card:hover {
        border-color: #999;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }

      .left {
        display: flex;
        align-items: center;
        gap: 18px;
        flex: 1;
      }

      .order-icon {
        width: 62px;
        height: 62px;
        border-radius: 50%;
        border: 1px solid #d9d9d9;
        color: #5e6470;
        display: grid;
        place-items: center;
        flex-shrink: 0;
        background: #f8f8f8;
      }

      .order-info h3 {
        margin: 0 0 4px;
        font-size: 16px;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .order-meta {
        font-size: 13px;
        color: #49586c;
        margin: 0;
      }

      .order-status {
        padding: 6px 12px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .status-pending {
        background: #fdf3e1;
        color: #d86f00;
      }

      .status-paid,
      .status-shipped,
      .status-delivered {
        background: #dbf2e9;
        color: #057a63;
      }

      .status-cancelled {
        background: #ffe5e5;
        color: #cd1f1f;
      }

      .right {
        display: flex;
        align-items: center;
        gap: 32px;
      }

      .price-wrap {
        text-align: right;
      }

      .price-label {
        font-size: 12px;
        color: #99a0a8;
        text-transform: uppercase;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .price {
        font-size: 28px;
        font-weight: 700;
      }

      .details-btn {
        border: none;
        background: #f6f6f6;
        border-radius: 999px;
        padding: 12px 20px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        color: #111827;
        transition: all 0.2s;
      }

      .details-btn:hover {
        background: #e8e8e8;
      }

      /* Empty State */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        background: var(--surface);
        border-radius: 16px;
        border: 1px solid var(--line);
      }

      .empty-state h3 {
        margin: 0 0 8px;
        font-size: 18px;
        font-weight: 600;
      }

      .empty-state p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      /* Modal */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 100;
        background: rgba(0, 0, 0, 0.45);
        align-items: center;
        justify-content: center;
      }

      .modal-overlay.active {
        display: flex;
      }

      .modal-box {
        background: #fff;
        border-radius: 16px;
        width: min(620px, 92vw);
        max-height: 85vh;
        overflow-y: auto;
        padding: 24px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      }

      .modal-close {
        float: right;
        border: 0;
        background: none;
        font-size: 28px;
        cursor: pointer;
        color: #999;
      }

      .modal-close:hover {
        color: #333;
      }

      .modal-title {
        margin: 0 0 20px;
        font-size: 18px;
        font-weight: 600;
        clear: both;
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--line);
      }

      .modal-order-id {
        font-size: 24px;
        font-weight: 700;
      }

      .modal-items {
        margin-bottom: 16px;
      }

      .order-item {
        padding: 12px;
        border-radius: 10px;
        background: #f4f4f4;
        margin-bottom: 8px;
      }

      .item-name {
        font-weight: 600;
        margin-bottom: 4px;
      }

      .item-detail {
        font-size: 13px;
        color: #667085;
      }

      .modal-summary {
        background: #f6f6f6;
        padding: 14px;
        border-radius: 10px;
      }

      .detail-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 14px;
      }

      .detail-row:last-child {
        margin-bottom: 0;
        font-weight: 700;
        border-top: 1px solid #e0e0e0;
        padding-top: 8px;
      }

      .detail-label {
        color: #667085;
      }

      .detail-value {
        font-weight: 600;
      }

      /* Footer */
      .site-footer {
        background: #171c29;
        color: #aeb3bb;
        margin-top: auto;
      }

      .footer-content {
        text-align: center;
        padding: 24px;
        font-size: 14px;
      }

      /* Responsive */
      @media (max-width: 900px) {
        nav {
          display: none;
        }

        .order-card {
          flex-direction: column;
          align-items: flex-start;
        }

        .right {
          width: 100%;
          justify-content: space-between;
        }

        .page-title {
          font-size: 36px;
        }
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header class="site-header">
      <div class="container header-content">
        <a href="/" class="brand">
          <img src="/src/assets/ishine-icon-transparent.png" alt="iShine" />
        </a>
        <nav>
          <a href="/">Ana səhifə</a>
          <a href="/#shop">Mağaza</a>
          <a href="/src/pages/orders.html" class="active">Sifarişlərim</a>
        </nav>
        <div class="header-actions">
          <a href="/src/pages/profile.html" class="icon-btn" aria-label="Profil">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="7" r="4"/><path d="M5.5 21a6.5 6.5 0 0 1 13 0"/></svg>
          </a>
          <a href="/#cart" class="icon-btn cart-btn" aria-label="Səbət">
            <span class="badge">0</span>
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6h15l-1.5 9h-12z"/><path d="M6 6L5 3H2"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/></svg>
          </a>
        </div>
      </div>
    </header>

    <!-- Main -->
    <main>
      <div class="container">
        <!-- Page Header -->
        <div class="page-header">
          <div class="header-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7h18v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="m8 7 1.5-3h5L16 7"/><path d="M9 12h6"/></svg>
          </div>
          <div>
            <h1 class="page-title">Sifarişlərim</h1>
            <p class="page-subtitle">Bütün keçmiş və aktiv sifarişləriniz</p>
          </div>
        </div>

        <!-- Orders List -->
        <div id="ordersContainer" class="orders-grid">
          <div class="empty-state">
            <h3>⏳ Sifarişlər yüklənir...</h3>
          </div>
        </div>
      </div>
    </main>

    <!-- Modal -->
    <div id="orderModal" class="modal-overlay">
      <div class="modal-box">
        <button class="modal-close" onclick="closeOrderModal()">&times;</button>
        <h2 class="modal-title">Sifariş Detalları</h2>
        <div id="modalContent"></div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="footer-content">© <span id="year">2026</span> iShine Accessories. Bütün hüquqlar qorunur.</div>
    </footer>

    <script type="module">
      import { getToken } from "/src/js/services/auth.service.js";
      import { apiFetch } from "/src/js/api/http.js";
      import { endpoints } from "/src/js/api/endpoints.js";

      const statusLabels = {
        pending: "Gözləmədə",
        paid: "Ödənildi",
        shipped: "Göndərildi",
        delivered: "Çatdırılıb",
        cancelled: "Ləğv edildi"
      };

      const statusClasses = {
        pending: "status-pending",
        paid: "status-paid",
        shipped: "status-shipped",
        delivered: "status-delivered",
        cancelled: "status-cancelled"
      };

      function formatDate(dateStr) {
        try {
          const date = new Date(dateStr);
          const day = String(date.getDate()).padStart(2, "0");
          const monthNames = ["Yan", "Fev", "Mar", "Apr", "May", "İyn", "İyl", "Avq", "Sen", "Okt", "Noy", "Dek"];
          const month = monthNames[date.getMonth()];
          const year = date.getFullYear();
          return `${day} ${month} ${year}`;
        } catch {
          return "Məlum deyil";
        }
      }

      function formatMoney(amount) {
        return `$${Math.round(Number(amount || 0))}`;
      }

      // Load orders
      async function loadOrders() {
        const token = getToken();
        if (!token) {
          window.location.href = "/src/pages/auth/login.html";
          return;
        }

        try {
          const response = await apiFetch(endpoints.orders.my());
          let orders = [];

          if (Array.isArray(response)) orders = response;
          else if (response && Array.isArray(response.items)) orders = response.items;
          else if (response && Array.isArray(response.data)) orders = response.data;

          const container = document.getElementById("ordersContainer");

          if (!orders || orders.length === 0) {
            container.innerHTML = `
              <div class="empty-state">
                <h3>Hələ sifarişiniz yoxdur</h3>
                <p>Məhsulları kəşf etməyə başlayın</p>
              </div>
            `;
            return;
          }

          container.innerHTML = orders
            .map((order) => {
              const id = order.Id || order.id;
              const status = (order.Status || order.status || "pending").toLowerCase();
              const total = order.Total || order.total || 0;
              const createdAt = order.CreatedAt || order.createdAt;
              const items = order.items || order.Items || [];

              return `
                <article class="order-card" onclick="viewOrder(${id}, '${JSON.stringify(order).replace(/'/g, "&apos;")}')">
                  <div class="left">
                    <div class="order-icon">
                      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg>
                    </div>
                    <div class="order-info">
                      <h3>#${id} <span class="order-status ${statusClasses[status] || "status-pending"}">${statusLabels[status] || status}</span></h3>
                      <p class="order-meta">${formatDate(createdAt)} • ${items.length || 0} məhsul</p>
                    </div>
                  </div>
                  <div class="right">
                    <div class="price-wrap">
                      <div class="price-label">ÜMUMİ MƏBLƏĞ</div>
                      <div class="price">${formatMoney(total)}</div>
                    </div>
                    <button class="details-btn" onclick="event.stopPropagation();viewOrder(${id}, '${JSON.stringify(order).replace(/'/g, "&apos;")}')">
                      Detallar ›
                    </button>
                  </div>
                </article>
              `;
            })
            .join("");
        } catch (error) {
          const container = document.getElementById("ordersContainer");
          container.innerHTML = `
            <div class="empty-state">
              <h3>Xəta baş verdi</h3>
              <p>${error.message || "Sifarişlər yükləmə xətası"}</p>
            </div>
          `;
        }
      }

      window.viewOrder = (id, orderStr) => {
        try {
          const order = JSON.parse(orderStr);
          const modal = document.getElementById("orderModal");
          const content = document.getElementById("modalContent");

          const status = (order.Status || order.status || "pending").toLowerCase();
          const items = order.items || order.Items || [];
          const subtotal = order.Subtotal || order.subtotal || order.Total || order.total || 0;
          const shippingFee = order.ShippingFee || order.shippingFee || 0;
          const total = order.Total || order.total || 0;

          const itemsHtml = items.length > 0
            ? items.map(item => `
                <div class="order-item">
                  <div class="item-name">${item.productName || item.ProductName || "Məhsul"}</div>
                  <div class="item-detail">
                    Miqdar: ${item.qty || item.Qty} × ${formatMoney(item.unitPrice || item.UnitPrice)} = ${formatMoney((item.qty || item.Qty) * (item.unitPrice || item.UnitPrice))}
                  </div>
                </div>
              `).join("")
            : '<div style="color:#667085;text-align:center;padding:12px;">Məhsul tapılmadı</div>';

          content.innerHTML = `
            <div class="modal-header">
              <div class="modal-order-id">#${id}</div>
              <span class="order-status ${statusClasses[status] || "status-pending"}">
                ${statusLabels[status] || status}
              </span>
            </div>

            <div class="modal-items">
              ${itemsHtml}
            </div>

            <div class="modal-summary">
              <div class="detail-row">
                <span class="detail-label">Ara cəm:</span>
                <span class="detail-value">${formatMoney(subtotal)}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Göndərmə:</span>
                <span class="detail-value">${formatMoney(shippingFee)}</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Toplam:</span>
                <span class="detail-value">${formatMoney(total)}</span>
              </div>
            </div>
          `;

          modal.classList.add("active");
        } catch {
          alert("Sifariş detalları göstərilə bilmədi");
        }
      };

      window.closeOrderModal = () => document.getElementById("orderModal").classList.remove("active");

      document.getElementById("orderModal")?.addEventListener("click", (e) => {
        if (e.target.id === "orderModal") window.closeOrderModal();
      });

      document.getElementById("year").textContent = new Date().getFullYear();
      loadOrders();
    </script>
  </body>
</html>
