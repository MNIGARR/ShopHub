<!doctype html>
<html>
<head><meta charset="utf-8"><title>Şifrə sıfırla</title></head>
<body>
  <div>
    <h2>Şifrə sıfırlama</h2>
    <input id="fpEmail" type="email" placeholder="E-poçt" />
    <button id="fpSend">Reset link göndər</button>
    <div id="msg"></div>
  </div>

  <script type="module">
    import { apiFetch } from "../../src/js/api/http.js"; // or use your apiFetch if module paths differ

    document.getElementById("fpSend").onclick = async () => {
      const email = (document.getElementById("fpEmail").value || "").trim();
      if (!/^\S+@\S+\.\S+$/.test(email)) {
        document.getElementById("msg").textContent = "Düzgün email daxil edin";
        return;
      }
      try {
        const res = await apiFetch("/api/auth/forgot-password", { method: "POST", body: { email }, auth: false });
        document.getElementById("msg").textContent = res.message || "If account exists, email sent";
      } catch (err) {
        document.getElementById("msg").textContent = err?.data?.message || err.message || "Xəta";
      }
    };
  </script>
</body>
</html>
