<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8" />
  <title>Ňěifr…ô sńĪfńĪrla</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    /* Sad…ô stil - m√∂vcud layih…ôn…ô uyńüunlaŇüdńĪr */
    .hidden { display: none !important; }
    .glass { /* yalnńĪz n√ľmun…ô, s…ôninki f…ôrqli ola bil…ôr */ }
    .error { color: #f87171; }
    .success { color: #34d399; }
  </style>
</head>
<body>
  <!-- STEP 1: Email g√∂nd…ôr -->
  <div id="stepSendCode" class="glass p-10 rounded-[32px] border border-white/5">
    <h2>Ňěifr…ô SńĪfńĪrlama</h2>
    <p>E-po√ßt √ľnvanńĪnńĪzńĪ daxil edin, siz…ô sńĪfńĪrlama kodu g√∂nd…ôr…ôc…ôyik</p>

    <div id="errorMsg1" class="hidden error"></div>
    <div id="successMsg1" class="hidden success"></div>

    <form id="sendCodeForm" class="space-y-4">
      <div>
        <label for="fpEmail">E-po√ßt</label>
        <input id="fpEmail" type="email" placeholder="n√ľmun…ô@email.com" />
      </div>
      <button id="fpSend" type="submit">SńĪfńĪrlama Kodu G√∂nd…ôr</button>
    </form>
  </div>

  <!-- STEP 2: Kod v…ô yeni Ňüifr…ô -->
  <div id="stepResetPassword" class="hidden glass p-10 rounded-[32px] border border-white/5">
    <h2>Yeni Ňěifr…ô</h2>
    <p>E-po√ßtunuza g…ôl…ôn kodu v…ô yeni Ňüifr…ônizi daxil edin</p>

    <div id="errorMsg2" class="hidden error"></div>
    <div id="successMsg2" class="hidden success"></div>

    <form id="resetForm" class="space-y-4">
      
      <div>
        <label>Yeni Ňěifr…ô</label>
        <input id="newPassword" type="password" placeholder="Minimum 6 simvol" />
      </div>
      <div>
        <label>Yeni Ňěifr…ônin T…ôkrarńĪ</label>
        <input id="confirmPassword" type="password" placeholder="Yeni Ňüifr…ôni t…ôkrar daxil edin" />
      </div>
      <button id="resetBtn" type="submit">Ňěifr…ôni Yenil…ô</button>
    </form>
  </div>

  <script type="module">
    import { endpoints } from "../js/api/endpoints.js";
    import { apiFetch } from "../js/api/http.js";

    let savedEmail = null; // burada saxlanacaq

    // STEP1: send code
    const sendForm = document.getElementById("sendCodeForm");
    const fpEmail = document.getElementById("fpEmail");
    const error1 = document.getElementById("errorMsg1");
    const success1 = document.getElementById("successMsg1");

    sendForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      error1.classList.add("hidden");
      success1.classList.add("hidden");

      const email = (fpEmail.value || "").trim();
      if (!/^\S+@\S+\.\S+$/.test(email)) {
        error1.textContent = "D√ľzg√ľn email daxil edin";
        error1.classList.remove("hidden");
        return;
      }

      try {
        // endpoints.auth.forgotPassword() layih…ô strukturu il…ô uyńüunlaŇüdńĪr
        await apiFetch(endpoints.auth.forgotPassword(), {
          method: "POST",
          body: { email },
          auth: false,
        });

        savedEmail = email; // Uńüurlu olduqda email-i saxla
        success1.textContent = "Kod g√∂nd…ôrildi. Emailinizi yoxlayńĪn.";
        success1.classList.remove("hidden");

        // g√∂st…ôrin step2-ni, gizl…ôdin step1-i
        document.getElementById("stepSendCode").classList.add("hidden");
        document.getElementById("stepResetPassword").classList.remove("hidden");
      } catch (err) {
        error1.textContent = err?.data?.message || err.message || "X…ôta baŇü verdi";
        error1.classList.remove("hidden");
      }
    });

    // STEP2: reset submit (istifad…ô√ßi kod v…ô parol daxil edir)
    const resetForm = document.getElementById("resetForm");
    const error2 = document.getElementById("errorMsg2");
    const success2 = document.getElementById("successMsg2");
    const resetBtn = document.getElementById("resetBtn");

    resetForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      error2.classList.add("hidden");
      success2.classList.add("hidden");

      const code = (document.getElementById("resetCode").value || "").trim();
      const newPassword = (document.getElementById("newPassword").value || "");
      const confirm = (document.getElementById("confirmPassword").value || "");

      if (!/^\d{6}$/.test(code)) {
        error2.textContent = "Kod yalnńĪz 6 r…ôq…ôm olmalńĪdńĪr";
        error2.classList.remove("hidden");
        return;
      }
      if (newPassword.length < 6) {
        error2.textContent = "Ňěifr…ô minimum 6 simvol olmalńĪdńĪr";
        error2.classList.remove("hidden");
        return;
      }
      if (newPassword !== confirm) {
        error2.textContent = "Yeni Ňüifr…ô v…ô t…ôkrarńĪ √ľst-√ľst…ô d√ľŇüm√ľr";
        error2.classList.remove("hidden");
        return;
      }

      if (!savedEmail) {
        // savedEmail yoxdursa b…ôlk…ô user s…ôhif…ôni birbaŇüa a√ßńĪb kodu yapńĪŇüdńĪrńĪb ‚ÄĒ bura bir x…ôb…ôrdarlńĪq ver
        error2.textContent = "Email m…ôlum deyil. Yenid…ôn email g√∂nd…ôrin v…ô ya link vasit…ôsil…ô sńĪfńĪrlayńĪn.";
        error2.classList.remove("hidden");
        return;
      }

      try {
        resetBtn.disabled = true;
        resetBtn.textContent = "Yenil…ônir...";

        await apiFetch(endpoints.auth.resetPassword(), {
          method: "POST",
          body: { email: savedEmail, code, newPassword },
        });

        success2.textContent = "Ňěifr…ô uńüurla yenil…ôndi";
        success2.classList.remove("hidden");

        setTimeout(() => {
          window.location.href = "/src/pages/auth/login.html";
        }, 1200);
      } catch (err) {
        error2.textContent = err?.data?.message || err.message || "X…ôta";
        error2.classList.remove("hidden");
      } finally {
        resetBtn.disabled = false;
        resetBtn.textContent = "Ňěifr…ôni Yenil…ô";
      }
    });

    // ∆Źlav…ô: …ôg…ôr s…ôhif…ô token il…ô a√ßńĪlńĪbsa (link-d…ôn g…ôl…ônl…ôr √ľ√ß√ľn),
    // burda token varsa redirect ed…ôr…ôk token-based reset s…ôhif…ôsin…ô y√∂nlendir…ô bil…ôrik.
    const q = new URLSearchParams(window.location.search);
    const token = q.get("token");
    if (token) {
      // Token varsa birbaŇüa ayrńĪ reset.html-…ô y√∂nl…ôndir
      // (v…ô ya burada token-based reset √ľ√ß√ľn UI g√∂st…ôrm…ôk olar)
      window.location.href = `/src/pages/auth/reset.html?token=${encodeURIComponent(token)}`;
    }
  </script>
</body>
</html>
