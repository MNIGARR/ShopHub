<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopHub | Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        background: radial-gradient(circle at top left, #f8f8f8 0%, #f2f2f1 50%, #ececeb 100%);
      }

      .auth-shell {
        position: relative;
        isolation: isolate;
      }

      .auth-shell::before,
      .auth-shell::after {
        content: "";
        position: absolute;
        z-index: -1;
        width: 18rem;
        height: 18rem;
        border-radius: 999px;
        background: rgba(18, 18, 22, 0.05);
        filter: blur(5px);
        animation: floatBlob 8s ease-in-out infinite;
      }

      .auth-shell::before {
        top: -4rem;
        left: -3rem;
      }

      .auth-shell::after {
        bottom: -5rem;
        right: -3rem;
        animation-delay: 1.5s;
      }

      .card-enter {
        animation: fadeUp 0.55s ease;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes floatBlob {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-16px);
        }
      }
    </style>
  </head>
  <body class="text-[#1f2125] min-h-screen font-sans flex items-center justify-center p-6">
    <div class="auth-shell w-full max-w-md">
      <div class="card-enter rounded-[36px] border border-[#d9d9d6] bg-[#f8f7f4]/95 p-8 sm:p-10 shadow-[0_20px_60px_rgba(18,18,22,0.08)]">
        <a href="/" class="inline-flex items-center gap-3 mb-8">
          <img src="/src/assets/ishine-icon-transparent.png" alt="iShine" class="h-12 w-auto object-contain" />
          <span class="text-xs uppercase tracking-[0.28em] text-[#5b6068]">Aksesuarlar</span>

        </a>
        <h2 class="text-4xl font-semibold leading-tight tracking-tight text-[#191b20]">Daxil ol</h2>
        <p class="mt-2 text-[#5b6068]">Hesabınıza daxil olub sifarişlərinizi izləyin.</p>


        <div id="errorMsg" class="hidden mt-6 rounded-2xl border border-red-300 bg-red-50 px-4 py-3 text-sm text-red-700"></div>

        <form id="loginForm" class="mt-6 space-y-5">
          <div>
            <label class="mb-2 block text-xs font-semibold uppercase tracking-[0.18em] text-[#70757e]">E-poçt</label>
            <input
              id="loginEmail"
              type="email"
              required
              class="w-full rounded-2xl border border-[#d0d2d7] bg-white px-5 py-3.5 text-sm text-[#1f2125] outline-none transition focus:border-[#1f2125] focus:shadow-[0_0_0_3px_rgba(31,33,37,0.08)]"
              placeholder="numune@email.com"
            />
            <p id="emailError" class="hidden mt-1 text-xs text-red-600"></p>
          </div>

          <div>
            <label class="mb-2 block text-xs font-semibold uppercase tracking-[0.18em] text-[#70757e]">Şifrə</label>
            <input
              id="loginPass"
              type="password"
              required
              minlength="6"
              class="w-full rounded-2xl border border-[#d0d2d7] bg-white px-5 py-3.5 text-sm text-[#1f2125] outline-none transition focus:border-[#1f2125] focus:shadow-[0_0_0_3px_rgba(31,33,37,0.08)]"
            />
            <p id="passError" class="hidden mt-1 text-xs text-red-600"></p>
          </div>

          <button
            id="loginBtn"
            type="submit"
            class="w-full rounded-2xl bg-[#14171b] px-5 py-4 text-base font-semibold text-white transition hover:-translate-y-0.5 hover:bg-black disabled:cursor-not-allowed disabled:opacity-60"          >
            Daxil ol
          </button>
        </form>

        <div class="mt-6 text-center space-y-3">
          <p class="text-sm text-[#5b6068]">
            Hesabınız yoxdur?
            <a href="/src/pages/auth/register.html" class="font-semibold text-[#1f2125] underline-offset-4 hover:underline">
              Qeydiyyat
            </a>          
          </p>
        </div>
      </div>
    </div>

    <script type="module">
      import { endpoints } from "/src/js/api/endpoints.js";
      import { apiFetch } from "/src/js/api/http.js";

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const emailEl = document.getElementById("loginEmail");
        const passEl = document.getElementById("loginPass");
        const errorMsg = document.getElementById("errorMsg");
        const emailError = document.getElementById("emailError");
        const passError = document.getElementById("passError");
        const btn = document.getElementById("loginBtn");

        errorMsg.classList.add("hidden");
        emailError.classList.add("hidden");
        passError.classList.add("hidden");

        const email = emailEl.value.trim();
        const password = passEl.value;

        let valid = true;

        if (!emailRegex.test(email)) {
          emailError.textContent = "Düzgün email formatı daxil edin";
          emailError.classList.remove("hidden");
          valid = false;
        }

        if (password.length < 6) {
          passError.textContent = "Şifrə minimum 6 simvol olmalıdır";
          passError.classList.remove("hidden");
          valid = false;
        }

        if (!valid) return;

        try {
          btn.disabled = true;
          btn.textContent = "Gözləyin...";

          const data = await apiFetch(endpoints.auth.login(), {
            method: "POST",
            body: { email, password },
          });

          const user = {
            id: data.user.id ?? data.user.Id,
            email: data.user.email ?? data.user.Email,
            role: String(data.user.role ?? data.user.Role ?? "user").toLowerCase(),
          };

          localStorage.setItem("shophub_auth_v1", JSON.stringify({ token: data.token, user }));

          // Redirect to home
          localStorage.setItem("shophub_token_v1", data.token);
          localStorage.setItem("shophub_user_v1", JSON.stringify(user));

          // Redirect admin directly to admin dashboard
          if (user.role === "admin") {
            window.location.href = "/admin/dashboard";
          } else {
            window.location.href = "/";
          }        
        } catch (err) {
          errorMsg.textContent = err.message || "Giriş uğursuz oldu";
          errorMsg.classList.remove("hidden");
        } finally {
          btn.disabled = false;
          btn.textContent = "Daxil ol";
        }
      });
    </script>
  </body>
</html>
