<!doctype html>
<html>
<head><meta charset="utf-8"><title>Yeni şifrə</title></head>
<body>
  <div>
    <h2>Yeni şifrə təyin et</h2>
    <input id="newPass" type="password" placeholder="Yeni şifrə (min 6 simvol)" />
    <button id="resetBtn">Təsdiq et</button>
    <div id="msg"></div>
  </div>

  <script type="module">
    import { apiFetch } from "../../src/js/api/http.js";

    function getQuery(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    document.getElementById("resetBtn").onclick = async () => {
      const pass = (document.getElementById("newPass").value || "").trim();
      if (pass.length < 6) { document.getElementById("msg").textContent = "Şifrə min 6 simvol olmalıdır"; return; }
      const token = getQuery("token");
      if (!token) { document.getElementById("msg").textContent = "Token yoxdur"; return; }

      try {
        const res = await apiFetch("/api/auth/reset-password", { method: "POST", body: { token, password: pass }, auth: false });
        document.getElementById("msg").textContent = res.message || "Şifrə sıfırlandı";
        setTimeout(() => window.location.href = "/login", 1500);
      } catch (err) {
        document.getElementById("msg").textContent = err?.data?.message || err.message || "Xəta";
      }
    };
  </script>
</body>
</html>
