<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopHub | Qeydiyyat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        background: radial-gradient(circle at top right, #f9f9f7 0%, #f2f2ef 50%, #ecece9 100%);
      }

      .auth-shell {
        position: relative;
        isolation: isolate;
      }

      .auth-shell::before,
      .auth-shell::after {
        content: "";
        position: absolute;
        z-index: -1;
        width: 17rem;
        height: 17rem;
        border-radius: 999px;
        background: rgba(16, 17, 19, 0.05);
        animation: floatBlob 9s ease-in-out infinite;
      }

      .auth-shell::before {
        top: -5rem;
        right: -2rem;
      }

      .auth-shell::after {
        bottom: -5rem;
        left: -2rem;
        animation-delay: 1.2s;
      }

      .card-enter {
        animation: fadeUp 0.6s ease;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes floatBlob {
        0%,
        100% {
          transform: translateY(0px);
        }
        50% {
          transform: translateY(-12px);
        }
      }
    </style>
  </head>
  <body class="text-[#1f2125] min-h-screen font-sans flex items-center justify-center p-6">
    <div class="auth-shell w-full max-w-md">
      <div class="card-enter rounded-[36px] border border-[#d9d9d6] bg-[#f8f7f4]/95 p-8 sm:p-10 shadow-[0_20px_60px_rgba(18,18,22,0.08)]">
        <a href="/" class="inline-flex items-center gap-3 mb-8">
          <img src="/src/assets/ishine-icon-transparent.png" alt="iShine" class="h-12 w-auto object-contain" />
          <span class="text-xs uppercase tracking-[0.28em] text-[#5b6068]">Aksesuarlar</span>
        </a>

        <h2 class="text-4xl font-semibold leading-tight tracking-tight text-[#191b20]">Qeydiyyat</h2>
        <p class="mt-2 text-[#5b6068]">Yeni hesab yaradıb alış-verişə başlayın.</p>

        <div id="errorMsg" class="hidden mt-6 rounded-2xl border border-red-300 bg-red-50 px-4 py-3 text-sm text-red-700"></div>
        <div id="successMsg" class="hidden mt-6 rounded-2xl border border-green-300 bg-green-50 px-4 py-3 text-sm text-green-700"></div>

        <form id="registerForm" class="mt-6 space-y-5">
          <div>
            <label class="mb-2 block text-xs font-semibold uppercase tracking-[0.18em] text-[#70757e]">E-poçt</label>            <input
              id="regEmail"
              type="email"
              required
              class="w-full rounded-2xl border border-[#d0d2d7] bg-white px-5 py-3.5 text-sm text-[#1f2125] outline-none transition focus:border-[#1f2125] focus:shadow-[0_0_0_3px_rgba(31,33,37,0.08)]"
              placeholder="numune@email.com"
            />
            <p id="emailError" class="hidden mt-1 text-xs text-red-600"></p>
          </div>

          <div>
            <label class="mb-2 block text-xs font-semibold uppercase tracking-[0.18em] text-[#70757e]">Şifrə</label>            <input
              id="regPass"
              type="password"
              required
              minlength="6"
              class="w-full rounded-2xl border border-[#d0d2d7] bg-white px-5 py-3.5 text-sm text-[#1f2125] outline-none transition focus:border-[#1f2125] focus:shadow-[0_0_0_3px_rgba(31,33,37,0.08)]"
              placeholder="Minimum 6 simvol"
            />
            <p id="passError" class="hidden mt-1 text-xs text-red-600"></p>
          </div>

          <div>
            <label class="mb-2 block text-xs font-semibold uppercase tracking-[0.18em] text-[#70757e]">Şifrə təkrarı</label>            <input
              id="regPassConfirm"
              type="password"
              required
              minlength="6"
              class="w-full rounded-2xl border border-[#d0d2d7] bg-white px-5 py-3.5 text-sm text-[#1f2125] outline-none transition focus:border-[#1f2125] focus:shadow-[0_0_0_3px_rgba(31,33,37,0.08)]"
              placeholder="Şifrəni təkrar daxil edin"
            />
            <p id="confirmError" class="hidden mt-1 text-xs text-red-600"></p>
          </div>

          <button
            id="registerBtn"
            type="submit"
            class="w-full rounded-2xl bg-[#14171b] px-5 py-4 text-base font-semibold text-white transition hover:-translate-y-0.5 hover:bg-black disabled:cursor-not-allowed disabled:opacity-60"
            >
            Qeydiyyatı tamamla
          </button>
        </form>

        <div class="mt-6 text-center">
          <p class="text-sm text-[#5b6068]">
              Artıq hesabınız var?
            <a href="/src/pages/auth/login.html" class="font-semibold text-[#1f2125] underline-offset-4 hover:underline">
              Daxil ol
            </a>
          </p>
        </div>
      </div>
    </div>

    <script type="module">
      import { endpoints } from "/src/js/api/endpoints.js";
      import { apiFetch } from "/src/js/api/http.js";

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const emailEl = document.getElementById("regEmail");
        const passEl = document.getElementById("regPass");
        const confirmEl = document.getElementById("regPassConfirm");
        const errorMsg = document.getElementById("errorMsg");
        const successMsg = document.getElementById("successMsg");
        const emailError = document.getElementById("emailError");
        const passError = document.getElementById("passError");
        const confirmError = document.getElementById("confirmError");
        const btn = document.getElementById("registerBtn");

        errorMsg.classList.add("hidden");
        successMsg.classList.add("hidden");
        emailError.classList.add("hidden");
        passError.classList.add("hidden");
        confirmError.classList.add("hidden");

        const email = emailEl.value.trim();
        const password = passEl.value;
        const confirm = confirmEl.value;

        let valid = true;

        if (!emailRegex.test(email)) {
          emailError.textContent = "Düzgün email formatı daxil edin";
          emailError.classList.remove("hidden");
          valid = false;
        }

        if (password.length < 6) {
          passError.textContent = "Şifrə minimum 6 simvol olmalıdır";
          passError.classList.remove("hidden");
          valid = false;
        }

        if (password !== confirm) {
          confirmError.textContent = "Şifrələr uyğun gəlmir";
          confirmError.classList.remove("hidden");
          valid = false;
        }

        if (!valid) return;

        try {
          btn.disabled = true;
          btn.textContent = "Gözləyin...";

          const data = await apiFetch(endpoints.auth.register(), {
            method: "POST",
            body: { email, password },
          });

          const user = {
            id: data.user.id ?? data.user.Id,
            email: data.user.email ?? data.user.Email,
            role: String(data.user.role ?? data.user.Role ?? "user").toLowerCase(),
          };

          localStorage.setItem("shophub_auth_v1", JSON.stringify({ token: data.token, user }));

          successMsg.textContent = "Qeydiyyat uğurla tamamlandı! Yönləndirilirsiniz...";
          successMsg.classList.remove("hidden");

          setTimeout(() => {
            window.location.href = "/";
          }, 1500);
        } catch (err) {
          errorMsg.textContent = err.message || "Qeydiyyat uğursuz oldu";
          errorMsg.classList.remove("hidden");
        } finally {
          btn.disabled = false;
          btn.textContent = "Qeydiyyatı tamamla";
        }
      });
    </script>
  </body>
</html>
