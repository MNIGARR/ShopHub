<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ShopHub | Qeydiyyat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- <link rel="stylesheet" href="../css/style.css" /> -->
    <style>
      .glass {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.05);
      }
    </style>
  </head>
  <body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans flex items-center justify-center">

    <div class="w-full max-w-md px-4">
      <!-- Logo -->
      <div class="text-center mb-10">
        <a href="../../index.html" class="inline-flex items-center gap-2">
          <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-600/20">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round" class="text-white">
              <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z" />
              <path d="M3 6h18" /><path d="M16 10a4 4 0 0 1-8 0" />
            </svg>
          </div>
          <span class="text-xl font-bold tracking-tight text-white uppercase">
            Shop<span class="text-blue-500">Hub</span>
          </span>
        </a>
      </div>

      <!-- Register Card -->
      <div class="glass p-10 rounded-[32px] border border-white/5">
        <h2 class="text-2xl font-bold text-white mb-2">Qeydiyyat</h2>
        <p class="text-slate-500 text-sm mb-8">Yeni hesab yaradın</p>

        <div id="errorMsg" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 text-sm p-4 rounded-xl mb-6"></div>
        <div id="successMsg" class="hidden bg-green-500/10 border border-green-500/20 text-green-400 text-sm p-4 rounded-xl mb-6"></div>

        <form id="registerForm" class="space-y-5">
          <div>
            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block">E-poçt</label>
            <input
              id="regEmail"
              type="email"
              required
              class="w-full bg-black/20 border border-white/10 rounded-xl px-5 py-4 text-sm focus:outline-none focus:border-green-500 transition-colors"
              placeholder="nümunə@email.com"
            />
            <p id="emailError" class="hidden text-red-400 text-xs mt-1"></p>
          </div>

          <div>
            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block">Şifrə</label>
            <input
              id="regPass"
              type="password"
              required
              minlength="6"
              class="w-full bg-black/20 border border-white/10 rounded-xl px-5 py-4 text-sm focus:outline-none focus:border-green-500 transition-colors"
              placeholder="Minimum 6 simvol"
            />
            <p id="passError" class="hidden text-red-400 text-xs mt-1"></p>
          </div>

          <div>
            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-2 block">Şifrə Təkrarı</label>
            <input
              id="regPassConfirm"
              type="password"
              required
              minlength="6"
              class="w-full bg-black/20 border border-white/10 rounded-xl px-5 py-4 text-sm focus:outline-none focus:border-green-500 transition-colors"
              placeholder="Şifrəni təkrar daxil edin"
            />
            <p id="confirmError" class="hidden text-red-400 text-xs mt-1"></p>
          </div>

          <button
            id="registerBtn"
            type="submit"
            class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-green-600/20 hover:bg-green-700 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
          >
            Qeydiyyatı Tamamla
          </button>
        </form>

        <div class="mt-6 text-center">
          <p class="text-sm text-slate-500">
            Artıq hesabınız var?
            <a href="login.html" class="text-blue-500 hover:text-blue-400 font-semibold">Daxil Ol</a>
          </p>
        </div>
      </div>
    </div>

    <script type="module">
      import { endpoints } from "../../js/api/endpoints.js";
      import { apiFetch } from "../../js/api/http.js";

      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const emailEl = document.getElementById("regEmail");
        const passEl = document.getElementById("regPass");
        const confirmEl = document.getElementById("regPassConfirm");
        const errorMsg = document.getElementById("errorMsg");
        const successMsg = document.getElementById("successMsg");
        const emailError = document.getElementById("emailError");
        const passError = document.getElementById("passError");
        const confirmError = document.getElementById("confirmError");
        const btn = document.getElementById("registerBtn");

        // Reset
        errorMsg.classList.add("hidden");
        successMsg.classList.add("hidden");
        emailError.classList.add("hidden");
        passError.classList.add("hidden");
        confirmError.classList.add("hidden");

        const email = emailEl.value.trim();
        const password = passEl.value;
        const confirm = confirmEl.value;

        // Frontend validation
        let valid = true;

        if (!emailRegex.test(email)) {
          emailError.textContent = "Düzgün email formatı daxil edin";
          emailError.classList.remove("hidden");
          valid = false;
        }

        if (password.length < 6) {
          passError.textContent = "Şifrə minimum 6 simvol olmalıdır";
          passError.classList.remove("hidden");
          valid = false;
        }

        if (password !== confirm) {
          confirmError.textContent = "Şifrələr uyğun gəlmir";
          confirmError.classList.remove("hidden");
          valid = false;
        }

        if (!valid) return;

        try {
          btn.disabled = true;
          btn.textContent = "Gözləyin...";

          const data = await apiFetch(endpoints.auth.register(), {
            method: "POST",
            body: { email, password },
          });

          // Save session
          const user = {
            id: data.user.id ?? data.user.Id,
            email: data.user.email ?? data.user.Email,
            role: String(data.user.role ?? data.user.Role ?? "user").toLowerCase(),
          };

          localStorage.setItem("shophub_auth_v1", JSON.stringify({ token: data.token, user }));

          successMsg.textContent = "Qeydiyyat uğurla tamamlandı! Yönləndirilirsiniz...";
          successMsg.classList.remove("hidden");

          setTimeout(() => {
            window.location.href = "../../index.html";
          }, 1500);
        } catch (err) {
          errorMsg.textContent = err.message || "Qeydiyyat uğursuz oldu";
          errorMsg.classList.remove("hidden");
        } finally {
          btn.disabled = false;
          btn.textContent = "Qeydiyyatı Tamamla";
        }
      });
    </script>
  </body>
</html>
